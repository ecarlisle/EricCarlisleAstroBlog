name: Deploy Astro site to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Check contact form public env presence
        run: |
          test -n "$PUBLIC_TURNSTILE_SITE_KEY" || (echo "Missing PUBLIC_TURNSTILE_SITE_KEY GitHub Actions variable" && exit 1)
          test -n "$PUBLIC_CONTACT_API_URL" || (echo "Missing PUBLIC_CONTACT_API_URL GitHub Actions variable" && exit 1)
          echo "Turnstile site key present"
          echo "Contact API URL present: $PUBLIC_CONTACT_API_URL"
        env:
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
          PUBLIC_CONTACT_API_URL: ${{ vars.PUBLIC_CONTACT_API_URL }}

      - name: Build with Astro
        run: pnpm build
        env:
          SITE: ${{ steps.pages.outputs.origin }}
          PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.PUBLIC_TURNSTILE_SITE_KEY }}
          PUBLIC_CONTACT_API_URL: ${{ vars.PUBLIC_CONTACT_API_URL }}

      - name: Verify contact endpoint in built output
        run: |
          echo "Checking contact form endpoint..."
          grep -o 'data-contact-api-url="[^"]*"' dist/contact/index.html || true
          grep -o "$PUBLIC_CONTACT_API_URL" dist/contact/index.html
        env:
          PUBLIC_CONTACT_API_URL: ${{ vars.PUBLIC_CONTACT_API_URL }}

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
